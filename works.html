<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works | Najisa</title>
  <link rel="icon" type="image/png" href="images/favicon-dark.png"  media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="images/favicon-light.png" media="(prefers-color-scheme: light)">
  <style>
    html,body { margin:0;padding:0;background:#000;color:#fff;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;overflow-x:hidden; }
    body.light-mode { background:#fff;color:#000; }
  </style>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/works.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="bg-container"><div class="mesh-layer dark-bg"></div><div class="mesh-layer light-bg"></div></div>
<canvas id="universe"></canvas>
<div class="top-container"><div class="top-layer top-dark"></div><div class="top-layer top-light"></div></div>

<div class="lamp-toggle" id="lampControl">
  <div class="click-mask" id="clickMask"></div>
  <div class="layer-part eye-dark"></div><div class="layer-part eye-light"></div>
  <div class="line-group"><div class="layer-part line-dark"></div><div class="layer-part line-light"></div></div>
  <div class="han-group"><div class="layer-part han-dark"></div><div class="layer-part han-light"></div></div>
</div>

<header class="topbar">
  <div class="topbar-lamp-space"></div>
  <a class="topbar-home" href="index.html">HOME</a>
  <div class="topbar-right">
    <div class="lang-picker" id="langPicker">
      <button class="lang-current" id="langCurrent">EN</button>
      <div class="lang-dropdown">
        <button class="lang-opt" data-lang="en">EN</button>
        <button class="lang-opt" data-lang="zh">中</button>
        <button class="lang-opt" data-lang="ja">日</button>
      </div>
    </div>
    <div class="burger-icon" id="burger"><span></span><span></span></div>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay">
  <nav class="menu-links">
    <a href="index.html#work"    class="menu-link">WORK</a>
    <a href="index.html#about"   class="menu-link">ABOUT</a>
    <a href="index.html#contact" class="menu-link">CONTACT</a>
    <a href="resume.html"        class="menu-link">RESUME</a>
  </nav>
  <div class="menu-footer"><p>Based in New York | Media &amp; Computational Design</p></div>
</div>

<!-- WORKS CONTENT -->
<div class="works-page">
  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-row">
      <div class="filter-chips" id="yearChips"></div>
    </div>
    <div class="filter-row">
      <div class="filter-chips" id="catChips"></div>
    </div>
  </div>

  <div class="works-area">
    <button class="wk-arrow wk-prev" id="wkPrev">
      <svg viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="8 2 2 9 8 16"/></svg>
    </button>
    <button class="wk-arrow wk-next" id="wkNext">
      <svg viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="2 2 8 9 2 16"/></svg>
    </button>
    <div class="works-track" id="worksTrack"></div>
  </div>

  <div class="progress-row">
    <div class="progress-rail" id="progressRail">
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <span class="lightbox-close" onclick="closeLightbox()">CLOSE ✕</span>
    <div id="lbMedia" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"></div>
  </div>
</div>

<script src="js/global.js"></script>
<script src="js/works-data.js"></script>
<script src="js/works-gallery.js"></script>
</body>
</html>
